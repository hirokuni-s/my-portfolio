<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Architect - 天展 (AMANO TEN)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #FBFBFA;
            color: #37352F;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // アイコン表示用のコンポーネント
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const profile = {
                name: "天展",
                role: "AIアーキテクト",
                tagline: "抽象と具体を往復し、経営変革を設計する唯一無二の「翻訳者」",
                description: "農作業の現場感覚から、VBAによるデータ分析、AIによるシステム開発まで。誠実さを土台に、ビジネスの多角的な原理を統合し、最短ルートで成果を出す『知の構造』を再構築します。",
                skills: ["AI Generative Integration", "Vercel / Next.js", "Python / VBA", "Data Analysis", "NLP (心理学)", "Business Strategy"],
                badges: [
                    { 
                        label: "Google AI Professional", 
                        isImage: true, 
                        src: "google-ai-professional-certificate(1).png", // アップロードしたファイル名に合わせています
                        color: "border-blue-200 bg-blue-50"
                    },
                    { label: "BJJ Purple Belt", icon: "shield", color: "border-purple-100 bg-purple-50" },
                    { label: "Bookkeeping Level 2", icon: "database", color: "border-gray-200 bg-white" },
                    { label: "IT Security", icon: "lock", color: "border-gray-200 bg-white" }
                ]
            };

            const pillars = [
                {
                    title: "抽象と具体の往復",
                    description: "トラクターを操る現場からAIアプリ開発まで、私は戦略と実務を往復します。原理は同じです。無駄を削ぎ落とし、最短ルートで成果を出す設計を行います。",
                    icon: "layers"
                },
                {
                    title: "多角的な知の再配置",
                    description: "簿記・宅建（ビジネスのルール）、統計・VBA（仕組みの原理）、NLP（人を動かす原理）。これらをAIで統合し、組織専用の構造を構築します。",
                    icon: "puzzle"
                },
                {
                    title: "柔術思考による設計",
                    description: "柔術紫帯としての知見を活かし、限られたリソースでいかに巨大な課題を解決するか。最小の力で最大の効果を生むアーキテクチャを提案します。",
                    icon: "zap"
                }
            ];

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b border-[#E9E9E7] z-50">
                        <div className="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between font-medium">
                            <span>{profile.name} | Portfolio</span>
                            <div className="flex gap-6 text-sm">
                                <a href="#about" className="hover:text-blue-600 transition-colors">About</a>
                                <a href="#strategy" className="hover:text-blue-600 transition-colors">Strategy</a>
                                <a href="#contact" className="hover:text-blue-600 transition-colors">Contact</a>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6 pt-32 pb-24">
                        {/* ヒーローセクション */}
                        <section id="home" className="mb-24">
                            <h1 className="text-5xl font-extrabold mb-6 tracking-tight leading-tight">
                                {profile.role}
                            </h1>
                            <p className="text-2xl text-blue-600 font-bold mb-6 italic border-l-4 border-blue-600 pl-4">
                                「{profile.tagline}」
                            </p>
                            
                            {/* バッジセクション */}
                            <div className="flex flex-wrap gap-3 mb-10">
                                {profile.badges.map((b, idx) => (
                                    <span key={idx} className={`flex items-center gap-2 px-3 py-1.5 border rounded-full text-xs font-bold shadow-sm ${b.color || 'border-[#E9E9E7] bg-white'}`}>
                                        {b.isImage ? (
                                            <img 
                                                src={b.src} 
                                                alt={b.label} 
                                                className="w-5 h-5 object-contain"
                                                onError={(e) => {
                                                    // 画像が見つからない場合はアイコンを表示
                                                    e.target.style.display = 'none';
                                                    if(e.target.nextSibling) e.target.nextSibling.style.display = 'block';
                                                }}
                                            />
                                        ) : null}
                                        {b.icon ? <Icon name={b.icon} size={14} className="text-gray-500" /> : null}
                                        {!b.icon && b.isImage ? <Icon name="award" size={14} className="text-blue-500 hidden" /> : null}
                                        {b.label}
                                    </span>
                                ))}
                            </div>

                            <p className="text-xl text-[#37352F] leading-relaxed max-w-2xl">
                                {profile.description}
                            </p>
                        </section>

                        {/* 戦略の3本柱 */}
                        <section id="strategy" className="mb-24">
                            <h2 className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-8">Service Architecture</h2>
                            <div className="grid md:grid-cols-3 gap-6">
                                {pillars.map((p, i) => (
                                    <div key={i} className="bg-white p-8 rounded-2xl border border-[#E9E9E7] hover:border-blue-200 transition-all shadow-sm hover:shadow-md">
                                        <div className="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600 mb-6">
                                            <Icon name={p.icon} size={24} />
                                        </div>
                                        <h3 className="text-lg font-bold mb-3">{p.title}</h3>
                                        <p className="text-sm text-[#6B6B6B] leading-relaxed">{p.description}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 専門性セクション */}
                        <section id="about" className="mb-24 bg-white p-10 rounded-3xl border border-[#E9E9E7]">
                            <h2 className="text-2xl font-bold mb-8">専門性の掛け合わせによるDX</h2>
                            <div className="space-y-8 text-lg leading-relaxed text-[#37352F]">
                                <div className="flex gap-4 items-start">
                                    <div className="mt-1.5"><Icon name="check-circle" size={20} className="text-green-500" /></div>
                                    <p><strong>市場価値としての「翻訳者」:</strong> 簿記・統計・VBAといった「データの言語」と、NLP・営業という「心理のパターン」を統合。経営最上流工程での意思決定を支援します。</p>
                                </div>
                                <div className="flex gap-4 items-start">
                                    <div className="mt-1.5"><Icon name="check-circle" size={20} className="text-green-500" /></div>
                                    <p><strong>唯一無二の説得力:</strong> ITスキルに留まらない農作業や総務などの実務経験。あらゆる現場の「解像度」が高いからこそ、真に機能するAIを設計できます。</p>
                                </div>
                            </div>
                            <div className="mt-10 flex flex-wrap gap-2">
                                {profile.skills.map(s => (
                                    <span key={s} className="px-3 py-1 bg-[#F1F1F0] rounded-md text-sm font-medium">#{s}</span>
                                ))}
                            </div>
                        </section>

                        {/* お問い合わせ */}
                        <section id="contact" className="bg-[#37352F] rounded-[2rem] p-12 text-white text-center relative overflow-hidden">
                            <div className="relative z-10">
                                <h2 className="text-3xl font-bold mb-6">経営変革（DX）の設計を、今ここから。</h2>
                                <p className="text-gray-400 mb-10 max-w-md mx-auto">
                                    御社専用の「知の構造」を再構築するためのご相談は、下記よりお気軽にご連絡ください。
                                </p>
                                <a href="mailto:your-email@example.com" className="inline-flex items-center gap-3 px-10 py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-lg">
                                    <Icon name="mail" size={20} />
                                    お問い合わせを開始する
                                </a>
                            </div>
                        </section>
                    </main>

                    <footer className="py-12 text-center text-[#9B9A97] text-sm">
                        <p>© {new Date().getFullYear()} {profile.name} - AI Architect</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
