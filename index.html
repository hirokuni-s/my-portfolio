<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI審神者 / AIアーキテクト - 天展「AIがある」</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #FBFBFA;
            color: #37352F;
        }
        .serif { font-family: 'Noto Serif JP', serif; }
        /* アニメーション */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const profile = {
                name: "天展「AIがある」",
                role: "AI審神者（AIサニワ） / AIアーキテクト",
                tagline: "現場の「氣」を読み、AIで「理」を構築する、次世代の右腕",
                concept: "「泥臭い現場のリアル」 × 「最新のAI実装」 × 「深層心理の解析」",
                description: "農業、営業、総務、EC運営まで多岐にわたる現場を歩み、社会のルール（理）を修得してきました。ビジネスを真に動かすのは、論理の裏側にある「見えないエネルギー」や「現場の直感」です。混迷する現代において、情報と感情の中から「真実」を読み解き、持続可能な勝利の設計図を引きます。",
                
                // 専門スキル・資格スタック
                skillGroups: [
                    {
                        category: "Logical / Legal",
                        skills: ["宅地建物取引士", "日商簿記2級", "証券外務員一種", "FP2級"]
                    },
                    {
                        category: "System / Data",
                        skills: ["Google AI Professional", "エクセルVBAエキスパート", "ビジネス統計スペシャリスト", "情報セキュリティマネジメント", "ITパスポート"]
                    },
                    {
                        category: "Psychology / Physical",
                        skills: [
                            "NLPマスタープラクティショナー", 
                            "レイキティーチャー", 
                            "EFTプラクティショナー", 
                            "ブラジリアン柔術 紫帯"
                        ]
                    }
                ],
                googleBadge: {
                    src: "google-ai-professional-certificate(1).png",
                    alt: "Google AI Professional Certificate"
                }
            };

            const values = [
                {
                    title: "審神者としての「本質の見極め」",
                    description: "資格と柔術で培った戦略的身体知を活かし、組織の停滞やプロジェクトの歪みを「気」の乱れとして察知。表面的な課題ではなく、根本的なボトルネックを特定します。",
                    icon: "eye"
                },
                {
                    title: "AIアーキテクトとしての「具現化力」",
                    description: "特定した本質を、AIやVBAを駆使して「機能するシステム」へ落とし込みます。NLPの知見を用い、システムが現場の心理と調和し、自然に運用される状態をデザインします。",
                    icon: "cpu"
                },
                {
                    title: "越境する「右腕」としての完遂能力",
                    description: "農業から営業、総務、ECまで経験した私に聖域はありません。社長の孤独な意思決定に寄り添い、法務・財務・技術の全方位からリスクをヘッジし、泥臭い実装まで完遂します。",
                    icon: "user-check"
                }
            ];

            return (
                <div className="min-h-screen relative overflow-hidden">
                    <nav className="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b border-[#E9E9E7] z-50">
                        <div className="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between font-medium">
                            <span className="serif text-lg tracking-wider">{profile.name}</span>
                            <div className="flex gap-6 text-sm">
                                <a href="#value" className="hover:text-blue-600 transition-colors">Values</a>
                                <a href="#stack" className="hover:text-blue-600 transition-colors">Skills</a>
                                <a href="#contact" className="hover:text-blue-600 transition-colors">Contact</a>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6 pt-32 pb-24 relative z-10">
                        {/* ヒーローセクション */}
                        <section id="home" className="mb-24 flex flex-col md:flex-row items-center md:items-start gap-10 md:text-left text-center fade-in-up">
                            
                            {/* 左側: Google バッジ */}
                            <div className="flex-shrink-0 w-36 h-36 md:w-44 md:h-44 p-2 bg-white rounded-3xl border-2 border-white shadow-2xl ring-1 ring-[#E9E9E7] flex items-center justify-center transform hover:rotate-3 hover:scale-105 transition-all duration-300">
                                <img 
                                    src={profile.googleBadge.src} 
                                    alt={profile.googleBadge.alt} 
                                    className="w-full h-full object-contain"
                                    onError={(e) => { e.target.parentElement.style.display = 'none'; }}
                                />
                            </div>

                            {/* 右側: プロフィールテキスト */}
                            <div className="flex-1 flex flex-col justify-center">
                                <h1 className="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight leading-tight">
                                    <span className="serif block text-2xl md:text-3xl text-gray-500 font-normal mb-2 tracking-widest uppercase">
                                        AI Saniwa / AI Architect
                                    </span>
                                    {profile.name}
                                </h1>
                                <p className="text-xl md:text-2xl text-blue-700 font-bold mb-4 serif fade-in-up delay-1">
                                    {profile.tagline}
                                </p>
                                <p className="text-lg md:text-xl text-gray-500 font-medium tracking-wide mb-6 fade-in-up delay-1">
                                    {profile.concept}
                                </p>
                            </div>
                        </section>

                        {/* コンセプト詳細 */}
                        <section className="mb-24 fade-in-up delay-2">
                            <div className="bg-white border-l-8 border-gray-800 p-8 md:p-12 shadow-sm rounded-r-3xl">
                                <p className="text-xl md:text-2xl text-[#37352F] leading-relaxed serif font-medium italic">
                                    {profile.description}
                                </p>
                            </div>
                        </section>

                        {/* 提供する3つの価値 */}
                        <section id="value" className="mb-24">
                            <h2 className="text-xs font-bold uppercase tracking-widest text-gray-400 mb-8 border-b border-gray-100 pb-2">3 Core Values</h2>
                            <div className="grid md:grid-cols-3 gap-6">
                                {values.map((v, i) => (
                                    <div key={i} className="bg-white p-8 rounded-2xl border border-[#E9E9E7] hover:border-blue-200 transition-all shadow-sm hover:shadow-md">
                                        <div className="w-12 h-12 bg-gray-900 rounded-xl flex items-center justify-center text-white mb-6">
                                            <Icon name={v.icon} size={24} />
                                        </div>
                                        <h3 className="text-lg font-bold mb-3 serif">{v.title}</h3>
                                        <p className="text-sm text-[#6B6B6B] leading-relaxed">{v.description}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* スキル・資格スタック */}
                        <section id="stack" className="mb-24">
                            <h2 className="text-2xl font-bold mb-8 serif">専門スキル・資格スタック</h2>
                            <div className="grid md:grid-cols-3 gap-8">
                                {profile.skillGroups.map((group, idx) => (
                                    <div key={idx} className="bg-white p-8 rounded-3xl border border-[#E9E9E7] shadow-sm">
                                        <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                                            <div className="w-2 h-2 bg-blue-600 rounded-full"></div>
                                            {group.category}
                                        </h3>
                                        <div className="space-y-3">
                                            {group.skills.map(skill => (
                                                <div key={skill} className="flex items-center gap-2 text-sm font-bold text-[#37352F]">
                                                    <Icon name="check-circle" size={14} className="text-green-500" />
                                                    {skill}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* お問い合わせ */}
                        <section id="contact" className="bg-gray-900 rounded-[2rem] p-12 text-white text-center relative overflow-hidden shadow-2xl">
                            <div className="relative z-10">
                                <h2 className="text-3xl font-bold mb-6 serif tracking-wider">経営変革（DX）の設計を、今ここから。</h2>
                                <p className="text-gray-400 mb-10 max-xl mx-auto leading-relaxed">
                                    御社専用の「知の構造」を再構築し、現場とAIを調和させるためのご相談は、下記よりお気軽にご連絡ください。
                                </p>
                                <a href="mailto:royalbluesmartboy@gmail.com" className="inline-flex items-center gap-3 px-10 py-4 bg-white text-gray-900 font-bold rounded-xl hover:bg-blue-50 transition-all shadow-lg active:scale-95">
                                    <Icon name="mail" size={20} />
                                    審神者の助言を仰ぐ
                                </a>
                            </div>
                        </section>
                    </main>

                    <footer className="py-12 text-center text-[#9B9A97] text-sm relative z-10">
                        <p className="tracking-widest uppercase">© {new Date().getFullYear()} {profile.name} - AI Saniwa / AI Architect</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
